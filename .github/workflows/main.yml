name: Update Subscription
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: # Добавляем права прямо в код для верности
      contents: write
    steps:
      - uses: actions/checkout@v4 # Обновили до v4
      - name: Set up Python
        uses: actions/setup-python@v5 # Обновили до v5
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: pip install requests
      - name: Run script
        run: python main.py
      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Update sub" || echo "No changes to commit"
          git push
